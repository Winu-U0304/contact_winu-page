<!DOCTYPE HTML> 
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>バグ報告・連絡フォーム - ウィーヌ</title>
    <link rel="icon" href="otameshi.png">
    <style>
        body {
            margin: 0;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            text-align: center;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            background-color: #333;
            padding: 10px 0;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }
        main {
            padding: 60px 20px;
        }
        .form-card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            max-width: 500px;
            margin: 0 auto;
            text-align: left;
        }
        h2 {
            color: #333;
            border-bottom: 3px solid #d32f2f;
            padding-bottom: 10px;
            text-align: center;
        }
        label {
            font-weight: bold;
            display: block;
            margin-top: 15px;
            color: #555;
        }
        input[type="text"], textarea {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box; /* 枠線がはみ出さないようにする */
        }
        textarea {
            resize: vertical; /* 縦方向だけサイズ変更可能にする */
        }
        button[type="submit"] {
            width: 100%;
            font-size: 18px;
            padding: 12px;
            margin-top: 25px;
            background-color: #d32f2f;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: 0.2s;
            font-weight: bold;
        }
        button[type="submit"]:hover {
            background-color: #b71c1c;
        }
    </style>
</head>
<body>

    <header>
        <div style="font-size: 30px; color: gold; padding: 0 20px; font-weight: bold;">ウィーヌ</div>
        <nav style="padding-right: 20px;">
            <a href="index.html" style="color: white; text-decoration: none; font-size: 18px;">← サイトに戻る</a>
        </nav>
    </header>

    <main>
        <div class="form-card">
            <h2>バグ報告・メッセージ</h2>
            <p style="font-size: 14px; color: #666; text-align: center;">
                ゲームで見つけたバグや、感想などを教えてください。<br>
                <strong>※内容は制作者（ウィーヌ）にだけ直接届きます。</strong>
            </p>

            <!-- ▼ ここから入力フォーム ▼ -->
            <!-- actionの "YOUR_FORM_ID" の部分を、Formspreeで取得したURLに変更してください -->
            <form action="https://formspree.io/f/YOUR_FORM_ID" method="POST">
                
                <label for="name">あなたのお名前（ニックネーム可）</label>
                <input type="text" id="name" name="name" placeholder="例：プレイヤー1" required>

                <label for="game-name">対象のゲーム</label>
                <input type="text" id="game-name" name="game" placeholder="例：WinuGame">

                <label for="message">バグの内容やメッセージ</label>
                <textarea id="message" name="message" rows="6" placeholder="どんなバグが起きたか、どんな状況だったか教えてください！" required></textarea>

                <button type="submit">送信する</button>

            </form>
            <!-- ▲ ここまで ▲ -->
            
        </div>
    </main>

</body>
</html>
